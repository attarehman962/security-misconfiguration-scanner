[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
markers =
    integration: tests that require the Docker stack to be running
    slow: tests that may take more than a few seconds
addopts = -ra
filterwarnings =
    ignore:'crypt' is deprecated and slated for removal in Python 3.13:DeprecationWarning:passlib\.utils
    ignore:Using `httpx` with `starlette\.testclient` is deprecated; install `httpx2` instead\.:Warning
