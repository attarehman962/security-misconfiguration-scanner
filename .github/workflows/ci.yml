name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test Python backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: security_scanner
      POSTGRES_PORT: "55432"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/security_scanner
      SECRET_KEY: ci-only-secret-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      APP_PORT: "8000"
      TARGET_SITE_PORT: "8099"
      BASE_URL: http://127.0.0.1:8000
      TARGET_SCAN_URL: http://target-site

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Build and start Docker stack
        run: |
          docker compose -f docker/docker-compose.yml -f docker-compose.ci.yml up -d --build app db target-site

      - name: Run pytest
        run: |
          pytest -q -m "not integration"
          pytest -q -m integration

      - name: Save Docker logs
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml -f docker-compose.ci.yml logs --no-color > docker-compose-ci.log

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-ci-log
          path: docker-compose-ci.log

      - name: Stop Docker stack
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml -f docker-compose.ci.yml down -v
